<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js Admin System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
    }

    /* Animated Background */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .bg-animation::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(74, 144, 226, 0.15) 0%, transparent 50%);
      animation: gradientShift 15s ease infinite;
    }

    @keyframes gradientShift {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-10%, -10%); }
    }

    /* Login Container */
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 48px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-header h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 0%, #a8b2ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-header p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.8);
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      transition: all 0.3s ease;
    }

    .form-input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(120, 119, 198, 0.5);
      box-shadow: 0 0 0 4px rgba(120, 119, 198, 0.1);
    }

    .form-input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #7877c6 0%, #4a90e2 100%);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(120, 119, 198, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 12px;
      padding: 12px 16px;
      color: #fca5a5;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .error-message.show {
      display: block;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Dashboard */
    .dashboard {
      display: none;
      padding: 32px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .dashboard.show {
      display: block;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding: 24px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
    }

    .dashboard-title h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .dashboard-title p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .user-avatar {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #7877c6 0%, #4a90e2 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
    }

    .logout-btn {
      padding: 10px 20px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 10px;
      color: #fca5a5;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
      font-weight: 500;
    }

    .logout-btn:hover {
      background: rgba(239, 68, 68, 0.25);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .stat-card {
      padding: 24px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .stat-label {
      color: rgba(255, 255, 255, 0.6);
      font-size: 13px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
    }

    .stat-icon {
      font-size: 24px;
      margin-right: 12px;
    }

    .scenes-section {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 24px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .scene-list {
      display: grid;
      gap: 16px;
    }

    .scene-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      transition: all 0.3s ease;
    }

    .scene-item:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .scene-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .scene-icon {
      font-size: 32px;
    }

    .scene-details h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .scene-details p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
    }

    .scene-toggle {
      padding: 8px 16px;
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 10px;
      color: #86efac;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 13px;
      font-weight: 500;
    }

    .scene-toggle.disabled {
      background: rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    .scene-toggle:hover {
      transform: scale(1.05);
    }

    .loading {
      text-align: center;
      padding: 48px;
      color: rgba(255, 255, 255, 0.6);
    }

    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top: 3px solid #7877c6;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .dashboard {
        padding: 16px;
      }

      .dashboard-header {
        flex-direction: column;
        gap: 16px;
        text-align: center;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .scene-item {
        flex-direction: column;
        gap: 16px;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="bg-animation"></div>

  <!-- Login Screen -->
  <div class="login-container" id="loginScreen">
    <div class="login-card">
      <div class="login-header">
        <h1>🎨 Admin System</h1>
        <p>Three.js Scene Management</p>
      </div>

      <div class="error-message" id="errorMessage"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            class="form-input"
            placeholder="admin"
            required
            autocomplete="username"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="btn" id="loginBtn">
          Sign In
        </button>
      </form>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">
    <div class="dashboard-header">
      <div class="dashboard-title">
        <h1>Dashboard</h1>
        <p>System Overview & Scene Management</p>
      </div>
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">A</div>
        <div>
          <div style="font-weight: 600; margin-bottom: 2px;" id="username-display">Admin</div>
          <div style="font-size: 12px; color: rgba(255,255,255,0.5);">Administrator</div>
        </div>
        <button class="logout-btn" id="logoutBtn">Logout</button>
      </div>
    </div>

    <div class="stats-grid" id="statsGrid">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading system stats...</p>
      </div>
    </div>

    <div class="scenes-section">
      <h2 class="section-title">
        <span>🎬</span>
        Scene Management
      </h2>
      <div class="scene-list" id="sceneList">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading scenes...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Configuration
    const API_BASE_URL = 'http://localhost:3001/api'

    // State
    let authToken = localStorage.getItem('adminToken')
    let currentUser = null

    // Elements
    const loginScreen = document.getElementById('loginScreen')
    const dashboard = document.getElementById('dashboard')
    const loginForm = document.getElementById('loginForm')
    const errorMessage = document.getElementById('errorMessage')
    const logoutBtn = document.getElementById('logoutBtn')
    const usernameDisplay = document.getElementById('username-display')
    const userAvatar = document.getElementById('userAvatar')
    const statsGrid = document.getElementById('statsGrid')
    const sceneList = document.getElementById('sceneList')

    // Initialize
    if (authToken) {
      verifyToken()
    }

    // Login
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault()

      const username = document.getElementById('username').value
      const password = document.getElementById('password').value
      const loginBtn = document.getElementById('loginBtn')

      loginBtn.disabled = true
      loginBtn.textContent = 'Signing In...'
      hideError()

      try {
        const response = await fetch(`${API_BASE_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        })

        const data = await response.json()

        if (!response.ok) {
          throw new Error(data.message || 'Login failed')
        }

        authToken = data.data.token
        localStorage.setItem('adminToken', authToken)

        await loadDashboard()
      } catch (error) {
        showError(error.message)
      } finally {
        loginBtn.disabled = false
        loginBtn.textContent = 'Sign In'
      }
    })

    // Verify token
    async function verifyToken() {
      try {
        const response = await fetch(`${API_BASE_URL}/auth/me`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        })

        if (!response.ok) {
          throw new Error('Invalid token')
        }

        const data = await response.json()
        currentUser = data.data

        await loadDashboard()
      } catch (error) {
        localStorage.removeItem('adminToken')
        authToken = null
        showLoginScreen()
      }
    }

    // Load dashboard
    async function loadDashboard() {
      showDashboard()

      if (currentUser) {
        usernameDisplay.textContent = currentUser.username
        userAvatar.textContent = currentUser.username.charAt(0).toUpperCase()
      }

      await Promise.all([
        loadStats(),
        loadScenes()
      ])
    }

    // Load stats
    async function loadStats() {
      try {
        const response = await fetch(`${API_BASE_URL}/admin/stats`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        })

        if (!response.ok) throw new Error('Failed to load stats')

        const data = await response.json()
        const stats = data.data

        const uptimeHours = Math.floor(stats.uptime / 3600)
        const uptimeMinutes = Math.floor((stats.uptime % 3600) / 60)

        statsGrid.innerHTML = `
          <div class="stat-card">
            <div class="stat-label">⏱️ Uptime</div>
            <div class="stat-value">${uptimeHours}h ${uptimeMinutes}m</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">📊 Requests</div>
            <div class="stat-value">${stats.requests}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">📦 Version</div>
            <div class="stat-value" style="font-size: 24px;">${stats.version}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">🚀 Status</div>
            <div class="stat-value" style="font-size: 20px; color: #86efac;">Healthy</div>
          </div>
        `
      } catch (error) {
        statsGrid.innerHTML = '<div class="loading"><p style="color: #fca5a5;">Failed to load stats</p></div>'
      }
    }

    // Load scenes
    async function loadScenes() {
      try {
        const response = await fetch(`${API_BASE_URL}/admin/scenes`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        })

        if (!response.ok) throw new Error('Failed to load scenes')

        const data = await response.json()
        const scenes = data.data

        const sceneIcons = {
          floor: '🏢',
          champagne: '🍾',
          glitter: '✨',
          subsurface: '🌟',
          vanning: '🚢'
        }

        sceneList.innerHTML = scenes.map(scene => `
          <div class="scene-item" data-scene-id="${scene.id}">
            <div class="scene-info">
              <div class="scene-icon">${sceneIcons[scene.id] || '🎨'}</div>
              <div class="scene-details">
                <h3>${scene.name}</h3>
                <p>ID: ${scene.id}</p>
              </div>
            </div>
            <button class="scene-toggle ${scene.enabled ? '' : 'disabled'}" onclick="toggleScene('${scene.id}')">
              ${scene.enabled ? '✓ Enabled' : '✗ Disabled'}
            </button>
          </div>
        `).join('')
      } catch (error) {
        sceneList.innerHTML = '<div class="loading"><p style="color: #fca5a5;">Failed to load scenes</p></div>'
      }
    }

    // Toggle scene
    async function toggleScene(sceneId) {
      try {
        const response = await fetch(`${API_BASE_URL}/admin/scenes/${sceneId}/toggle`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${authToken}` }
        })

        if (!response.ok) throw new Error('Failed to toggle scene')

        await loadScenes()
      } catch (error) {
        alert('Failed to toggle scene: ' + error.message)
      }
    }
    window.toggleScene = toggleScene

    // Logout
    logoutBtn.addEventListener('click', async () => {
      try {
        await fetch(`${API_BASE_URL}/auth/logout`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${authToken}` }
        })
      } catch (error) {
        console.error('Logout error:', error)
      }

      localStorage.removeItem('adminToken')
      authToken = null
      currentUser = null
      showLoginScreen()
    })

    // UI Helpers
    function showLoginScreen() {
      loginScreen.style.display = 'flex'
      dashboard.classList.remove('show')
    }

    function showDashboard() {
      loginScreen.style.display = 'none'
      dashboard.classList.add('show')
    }

    function showError(message) {
      errorMessage.textContent = message
      errorMessage.classList.add('show')
    }

    function hideError() {
      errorMessage.classList.remove('show')
    }
  </script>
</body>
</html>
